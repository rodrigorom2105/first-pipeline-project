<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>Motivation Message App</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #dbeafe, #eff6ff);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .card {
        background: white;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        text-align: center;
        width: 400px;
      }

      h1 {
        margin-bottom: 10px;
      }

      p {
        color: #444;
      }

      button {
        margin-top: 20px;
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        background-color: #2563eb;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background-color: #1d4ed8;
      }

      #message {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
        color: #111827;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Motivation Message App</h1>
      <p>Click the button to get a random motivational message.</p>
      <button id="messageBtn">Show Message</button>
      <div id="message"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
